name: AI Dashboard

on:
  push:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build-dashboard:
    name: Build AI Authorship Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ai
        run: curl -sSL https://usegitai.com/install.sh | bash

      - name: Fetch git notes
        run: git fetch origin refs/notes/*:refs/notes/* || echo "No notes yet"

      - name: Compute 7-day stats
        run: |
          SINCE_SHA=$(git log --since="7 days ago" --format="%H" | tail -1)
          if [ -z "$SINCE_SHA" ]; then
            SINCE_SHA="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
          fi
          echo "Range: $SINCE_SHA..HEAD"
          git-ai stats "$SINCE_SHA..HEAD" --json 2>/dev/null > stats.json || echo "{}" > stats.json
          cat stats.json

      - name: Build dashboard HTML
        run: |
          python3 << 'EOF'
          import json, datetime

          with open('stats.json') as f:
              raw = json.load(f)

          data  = raw.get('range_stats', raw)
          auth  = raw.get('authorship_stats', {})

          human      = data.get('human_additions', 0)
          ai         = data.get('ai_additions', 0)
          accepted   = data.get('ai_accepted', 0)
          total      = data.get('git_diff_added_lines', 0)
          gen        = data.get('total_ai_additions', 0)
          wait_s     = data.get('time_waiting_for_ai', 0)
          breakdown  = data.get('tool_model_breakdown', {})

          ai_pct  = round(ai / total * 100, 1) if total > 0 else 0
          wait_h  = round(wait_s / 3600, 1)

          # Top agent
          top_agent, top_lines = 'N/A', 0
          for key, m in breakdown.items():
              tool = key.split('/')[0].split('::')[0].replace('-', ' ').title()
              if m.get('ai_additions', 0) > top_lines:
                  top_lines = m.get('ai_additions', 0)
                  top_agent = tool

          # Models
          model_totals = {}
          for key, m in breakdown.items():
              model = key.split('/', 1)[1] if '/' in key else key
              model_totals[model] = model_totals.get(model, 0) + m.get('ai_additions', 0)
          model_sorted = sorted(model_totals.items(), key=lambda x: x[1], reverse=True)[:5]
          model_max = model_sorted[0][1] if model_sorted else 1

          # Parallel agents
          tools = set(key.split('/')[0].split('::')[0] for key in breakdown)
          parallel = len(tools)

          # Ratio
          if gen > 0 and ai > 0 and accepted > 0:
              b = min(gen, ai, accepted)
              ratio = f"{round(gen/b,1)}:{round(ai/b,1)}:{round(accepted/b,1)}"
          else:
              ratio = 'N/A'

          total_commits    = auth.get('total_commits', 0)
          commits_with_ai  = auth.get('commits_with_authorship', 0)
          updated_at       = datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')

          COLORS = ['#4fa3e3', '#a78bfa', '#34d399', '#fb923c', '#f472b6']

          model_bars = ''
          for i, (model, lines) in enumerate(model_sorted):
              pct   = round(lines / model_max * 100)
              color = COLORS[i % len(COLORS)]
              short = (model[:26] + '…') if len(model) > 26 else model
              model_bars += f'''<div class="model-row">
                <span class="model-name">{short}</span>
                <div class="model-bar-wrap"><div class="model-bar" style="width:{pct}%;background:{color}"></div></div>
                <span class="model-count">{lines}</span>
              </div>'''

          committers   = auth.get('authors_committing_authorship', [])
          contrib_tags = ''.join(
              f'<div class="contrib-tag">{c.split("<")[0].strip()}</div>'
              for c in committers[:8]
          ) or '<span style="color:var(--sub)">No data available</span>'

          HTML = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>AI Authorship Dashboard</title>
            <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
            <style>
              *,*::before,*::after{{box-sizing:border-box;margin:0;padding:0}}
              :root{{
                --bg:#0d0d0f;--surface:#141418;--border:#232329;--muted:#3a3a45;
                --text:#e8e8f0;--sub:#8888a0;--accent:#f97316;--blue:#4fa3e3;
                --green:#34d399;--r:12px;
              }}
              body{{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;padding:2rem;min-height:100vh}}
              header{{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}}
              h1{{font-size:1.75rem;font-weight:700;letter-spacing:-.02em}}
              header p{{color:var(--sub);font-size:.9rem;margin-top:.4rem}}
              .ts{{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);direction:ltr}}
              .grid3{{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}}
              .grid-wide{{display:grid;grid-template-columns:1fr 1fr 2fr;gap:1rem;margin-bottom:1rem}}
              .card{{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;position:relative;overflow:hidden}}
              .card::before{{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 60%);pointer-events:none}}
              .lbl{{font-size:.68rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.12em;color:var(--sub);text-transform:uppercase;margin-bottom:1.2rem}}
              /* AI PCT */
              .big{{font-size:4rem;font-weight:700;color:var(--accent);line-height:1;font-family:'IBM Plex Mono',monospace;text-align:center}}
              .bar-bg{{height:6px;background:var(--muted);border-radius:3px;overflow:hidden;margin-top:1rem}}
              .bar-fill{{height:100%;background:linear-gradient(90deg,var(--accent),#fb923c);border-radius:3px}}
              /* agent */
              .agent{{font-size:1.6rem;font-weight:600;display:flex;align-items:center;gap:.6rem;margin-top:.5rem}}
              .dot{{width:10px;height:10px;border-radius:50%;background:var(--blue);flex-shrink:0}}
              /* models */
              .model-row{{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem}}
              .model-name{{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--sub);width:150px;flex-shrink:0;direction:ltr;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}}
              .model-bar-wrap{{flex:1;height:5px;background:var(--muted);border-radius:3px;overflow:hidden}}
              .model-bar{{height:100%;border-radius:3px}}
              .model-count{{font-family:'IBM Plex Mono',monospace;font-size:.73rem;color:var(--text);width:34px;text-align:right}}
              /* stat */
              .stat{{font-size:2.2rem;font-weight:700;font-family:'IBM Plex Mono',monospace}}
              .stat-sub{{font-size:.78rem;color:var(--sub);margin-top:.35rem}}
              /* output */
              .out-grid{{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:.5rem}}
              .out-item label{{display:block;font-size:.62rem;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;color:var(--sub);text-transform:uppercase;margin-bottom:.4rem}}
              .out-val{{font-size:1.5rem;font-weight:700;font-family:'IBM Plex Mono',monospace}}
              .c-blue{{color:var(--blue)}} .c-green{{color:var(--green)}} .c-orange{{color:var(--accent)}} .c-white{{color:var(--text)}}
              /* contrib */
              .contrib-wrap{{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}}
              .contrib-tag{{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.3rem .7rem;font-size:.78rem;color:var(--sub)}}
              .divider{{height:1px;background:var(--border);margin:1rem 0}}
              .meta{{display:flex;gap:2rem;font-size:.82rem;color:var(--sub);flex-wrap:wrap}}
              .meta strong{{color:var(--text)}}
              .footer{{margin-top:2rem;font-size:.73rem;color:var(--muted);font-family:'IBM Plex Mono',monospace;direction:ltr}}
              @media(max-width:900px){{.grid3,.grid-wide{{grid-template-columns:1fr}}}}
            </style>
          </head>
          <body>
            <header>
              <div>
                <h1>AI Authorship Dashboard</h1>
                <p>Cross-agent statistics and session analysis to improve your AI-aided development.</p>
              </div>
              <div class="ts">updated : {updated_at}</div>
            </header>

            <div class="grid3">
              <div class="card">
                <div class="lbl">AI CODE (7 ימים)</div>
                <div class="big">{ai_pct}%</div>
                <div class="bar-bg"><div class="bar-fill" style="width:{ai_pct}%"></div></div>
              </div>
              <div class="card">
                <div class="lbl">TOP AGENT (last 7 days)</div>
                <div class="agent"><span class="dot"></span>{top_agent}</div>
                <div style="margin-top:1rem;color:var(--sub);font-size:.8rem">{top_lines} AI lines</div>
              </div>
              <div class="card">
                <div class="lbl">TOP MODELS (last 7 days)</div>
                {model_bars or '<div style="color:var(--sub);font-size:.85rem">No data available</div>'}
              </div>
            </div>

            <div class="grid-wide">
              <div class="card">
                <div class="lbl">AI USAGE (last 7 days)</div>
                <div class="stat">{wait_h}hrs</div>
                <div class="stat-sub">Time waiting for AI responses</div>
              </div>
              <div class="card">
                <div class="lbl">PARALLEL AGENTS (last 7 days)</div>
                <div class="stat">{parallel}</div>
                <div class="stat-sub">Distinct agents in use</div>
              </div>
              <div class="card">
                <div class="lbl">AI OUTPUT (last 7 days)</div>
                <div class="out-grid">
                  <div class="out-item"><label>GENERATED</label><div class="out-val c-blue">{gen}</div></div>
                  <div class="out-item"><label>COMMITTED</label><div class="out-val c-green">{ai}</div></div>
                  <div class="out-item"><label>MERGED</label><div class="out-val c-orange">{accepted}</div></div>
                  <div class="out-item"><label>RATIO</label><div class="out-val c-white" style="font-size:1.1rem">{ratio}</div></div>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="lbl">CONTRIBUTORS WITH AUTHORSHIP DATA</div>
              <div class="contrib-wrap">{contrib_tags}</div>
              <div class="divider"></div>
              <div class="meta">
                <span>Total commits: <strong>{total_commits}</strong></span>
                <span>With attribution: <strong style="color:var(--green)">{commits_with_ai}</strong></span>
                <span>Human lines: <strong>{human}</strong></span>
                <span>AI lines: <strong style="color:var(--accent)">{ai}</strong></span>
              </div>
            </div>

          <div class="footer">powered by git-ai · nice-cxone · data stored exclusively in git notes</div>
          </body>
          </html>"""

          with open('dashboard.html', 'w', encoding='utf-8') as f:
              f.write(HTML)
          print("✅ dashboard.html generated")
          EOF

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          include_files: dashboard.html
          commit_message: "dashboard: update AI stats [skip ci]"
