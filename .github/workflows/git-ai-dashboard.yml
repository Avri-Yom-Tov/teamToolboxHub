name: Git AI Dashboard Generator

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  generate-dashboard:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-ai
          
      - name: Setup Git AI
        shell: pwsh
        run: |
          # Check if git-ai is already installed
          try {
            git-ai --version
            Write-Host "Git AI already installed"
          } catch {
            Write-Host "Installing Git AI..."
            irm https://usegitai.com/install.ps1 | iex
            
            # Refresh PATH for current session
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            
            # Verify installation
            Write-Host "Verifying installation..."
            & "$env:USERPROFILE\.git-ai\bin\git-ai.exe" --version
          }
          
      - name: Fetch Git AI Notes
        shell: pwsh
        run: |
          git fetch origin 'refs/notes/ai:refs/notes/ai' || Write-Host "No AI notes found yet"
          
      - name: Generate Dashboard Data
        shell: pwsh
        run: |
          # Run the dashboard generation script
          ./scripts/gitAistats/generateDashboard.ps1
          
      - name: Commit Dashboard Updates
        shell: pwsh
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add gitAistats/dashboard.html gitAistats/dashboard-data.json
          
          if (git diff --staged --quiet) {
            Write-Host "No changes to commit"
          } else {
            git commit -m "Update Git AI Dashboard [skip ci]"
            git push
          }
          
      - name: Upload Dashboard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-ai-dashboard
          path: gitAistats/dashboard.html
          retention-days: 90
