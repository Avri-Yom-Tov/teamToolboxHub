name: PR AI Authorship Report

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-report:
    name: Post AI Authorship Comment
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-ai
        run: curl -sSL https://usegitai.com/install.sh | bash

      - name: Fetch git notes
        run: git fetch origin refs/notes/*:refs/notes/* || echo "No notes yet"

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Compute PR stats
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Range: $BASE_SHA..$HEAD_SHA"
          git-ai stats "$BASE_SHA..$HEAD_SHA" --json 2>/dev/null > stats.json || echo "{}" > stats.json
          cat stats.json

      - name: Build comment body
        run: |
          python3 << 'PYEOF'
          import json, os, datetime

          with open('stats.json') as f:
              raw = json.load(f)

          data  = raw.get('range_stats', raw)
          auth  = raw.get('authorship_stats', {})

          human      = data.get('human_additions', 0)
          ai         = data.get('ai_additions', 0)
          accepted   = data.get('ai_accepted', 0)
          total      = data.get('git_diff_added_lines', 0)
          gen        = data.get('total_ai_additions', 0)
          wait_s     = data.get('time_waiting_for_ai', 0)
          breakdown  = data.get('tool_model_breakdown', {})

          ai_pct      = round(ai / total * 100, 1) if total > 0 else 0
          human_pct   = round(100 - ai_pct, 1)
          accept_rate = round(accepted / gen * 100, 1) if gen > 0 else 0
          wasted      = max(gen - ai, 0)

          if wait_s >= 3600:
              wait_str = f"{round(wait_s/3600,1)}h"
          elif wait_s >= 60:
              wait_str = f"{round(wait_s/60,1)}m"
          else:
              wait_str = f"{wait_s}s"

          AGENT_NAMES = {
              'cursor': 'Cursor',
              'github-copilot': 'GitHub Copilot',
              'claude-code': 'Claude Code',
              'copilot': 'GitHub Copilot',
              'windsurf': 'Windsurf',
          }

          def clean_agent(key):
              raw_tool = key.split('/')[0].split('::')[0].lower()
              return AGENT_NAMES.get(raw_tool, raw_tool.replace('-',' ').title())

          def clean_model(key):
              tool_raw = key.split('/')[0].split('::')[0].lower()
              agent    = AGENT_NAMES.get(tool_raw, tool_raw.replace('-',' ').title())
              if '/' in key:
                  model = key.split('/',1)[1]
                  if model in ('auto','unknown','default'):
                      return agent
                  return f"{agent} / {model}"
              sub = key.split('::')
              if len(sub) > 1 and sub[1] not in ('unknown','default','auto'):
                  return f"{agent} / {sub[1]}"
              return agent

          top_agent, top_lines = 'N/A', 0
          agents_used = []
          for key, m in breakdown.items():
              name = clean_agent(key)
              lines = m.get('ai_additions', 0)
              if lines > top_lines:
                  top_lines = lines
                  top_agent = name
              agents_used.append(name)

          model_totals = {}
          for key, m in breakdown.items():
              label = clean_model(key)
              model_totals[label] = model_totals.get(label, 0) + m.get('ai_additions', 0)
          model_sorted = sorted(model_totals.items(), key=lambda x: x[1], reverse=True)[:5]

          agents_unique = sorted(set(agents_used))
          models_str = ', '.join(f"{lbl} ({ln})" for lbl, ln in model_sorted) if model_sorted else 'N/A'

          committers = auth.get('authors_committing_authorship', [])
          contributors = [c.split('<')[0].strip() for c in committers]

          pr_number   = os.environ.get('PR_NUMBER', '')
          pr_title    = os.environ.get('PR_TITLE', '')
          repo_name   = os.environ.get('GITHUB_REPOSITORY', '')
          pr_author   = os.environ.get('PR_AUTHOR', '')
          updated_at  = datetime.datetime.now(datetime.timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          record = {
              "task_id": f"PR-{pr_number}",
              "user_id": pr_author,
              "repo": repo_name,
              "task_description": pr_title,
              "agent_config": agents_unique,
              "tools_used": list(model_totals.keys()),
              "added_loc": total,
              "ai_loc": ai,
              "human_loc": human,
              "wasted_loc": wasted,
              "ai_pct": ai_pct,
              "acceptance_rate": accept_rate,
              "latency": wait_str,
              "latency_seconds": wait_s,
              "contributors": contributors,
              "timestamp": updated_at,
              "schema_version": "1.0"
          }

          bars = ''
          if model_sorted:
              max_lines = model_sorted[0][1] if model_sorted else 1
              for lbl, ln in model_sorted:
                  filled = round(ln / max_lines * 10)
                  bar = '\u2588' * filled + '\u2591' * (10 - filled)
                  bars += f"| {lbl} | {bar} | {ln} |\n"

          lines = []
          lines.append(f'## AI Authorship Report — PR #{pr_number}')
          lines.append(f'> **{pr_title}** by `{pr_author}`')
          lines.append('')
          lines.append('| Metric | Value |')
          lines.append('|--------|-------|')
          lines.append(f'| AI Code % | **{ai_pct}%** |')
          lines.append(f'| Human Code % | {human_pct}% |')
          lines.append(f'| AI Lines (committed) | {ai} |')
          lines.append(f'| Human Lines | {human} |')
          lines.append(f'| Total Lines Added | {total} |')
          lines.append(f'| Generated by AI | {gen} |')
          lines.append(f'| Accepted as-is | {accepted} |')
          lines.append(f'| Wasted (generated but discarded) | {wasted} |')
          lines.append(f'| Acceptance Rate | **{accept_rate}%** |')
          lines.append(f'| Top Agent | {top_agent} |')
          lines.append(f'| AI Wait Time | {wait_str} |')
          lines.append('')

          if model_sorted:
              lines.append('### Models Breakdown')
              lines.append('| Model | Usage | Lines |')
              lines.append('|-------|-------|-------|')
              lines.append(bars)

          if contributors:
              lines.append(f"**Contributors with AI data:** {', '.join(contributors)}")
              lines.append('')

          lines.append('---')
          lines.append(f'<sub>powered by git-ai \u00b7 {repo_name} \u00b7 {updated_at}</sub>')
          lines.append('')
          lines.append('<!-- AGENT_EXPERIENCE_RECORD')
          lines.append(json.dumps(record, indent=2))
          lines.append('-->')

          md = '\n'.join(lines)

          with open('comment.md', 'w', encoding='utf-8') as f:
              f.write(md)
          print("comment.md generated")
          PYEOF
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');
            const marker = '## AI Authorship Report';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new comment');
            }
