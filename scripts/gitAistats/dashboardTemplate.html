<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git AI Dashboard - {{REPO_NAME}}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1f6feb 0%, #58a6ff 100%);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(31, 111, 235, 0.3);
        }
        
        .header h1 {
            margin: 0;
            font-size: 48px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .header .subtitle {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
            font-size: 16px;
        }
        
        .header .update-time {
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.2);
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
        }
        
        .stat-card h3 {
            margin: 0 0 15px 0;
            color: #58a6ff;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .stat-card .value {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 10px;
        }
        
        .stat-card .label {
            color: #8b949e;
            font-size: 13px;
        }
        
        .stat-card .icon {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 40px;
            opacity: 0.1;
        }
        
        .section {
            background: linear-gradient(135deg, #161b22 0%, #1c2128 100%);
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .section h2 {
            margin: 0 0 25px 0;
            color: #58a6ff;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section h2::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #1f6feb, #58a6ff);
            border-radius: 2px;
        }
        
        .progress-bar {
            background: #21262d;
            height: 40px;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px 0;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #2ea043);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .progress-fill.ai {
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
        }
        
        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        .progress-labels span {
            font-weight: 600;
        }
        
        .commit-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .commit-item {
            padding: 18px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s ease;
        }
        
        .commit-item:hover {
            background: rgba(88, 166, 255, 0.05);
        }
        
        .commit-item:last-child {
            border-bottom: none;
        }
        
        .commit-sha {
            font-family: 'Courier New', monospace;
            background: rgba(31, 111, 235, 0.2);
            color: #58a6ff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(31, 111, 235, 0.3);
        }
        
        .commit-message {
            flex: 1;
            color: #c9d1d9;
        }
        
        .ai-badge {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(35, 134, 54, 0.3);
        }
        
        .timestamp {
            color: #8b949e;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #8b949e;
            font-size: 13px;
            border-top: 1px solid #30363d;
        }
        
        .footer a {
            color: #58a6ff;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        .badge-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .badge {
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 32px; }
            .stats-grid { grid-template-columns: 1fr; }
            .chart-grid { grid-template-columns: 1fr; }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        
        .spinner {
            border: 3px solid #30363d;
            border-top: 3px solid #58a6ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Git AI Dashboard</h1>
            <div class="subtitle">{{REPO_NAME}}</div>
            <div class="update-time">Last updated: {{GENERATED_AT}}</div>
        </div>
        
        <div id="dashboard-content">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading dashboard data...</p>
            </div>
        </div>
    </div>
    
    <script>
        // Dashboard data injected by PowerShell script
        const dashboardData = {{DASHBOARD_DATA}};
        
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', () => {
            renderDashboard(dashboardData);
        });
        
        function renderDashboard(data) {
            const container = document.getElementById('dashboard-content');
            
            container.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="icon">🤖</div>
                        <h3>AI Code Contribution</h3>
                        <div class="value">${data.ai_metrics.ai_percentage}%</div>
                        <div class="label">${data.ai_metrics.ai_lines.toLocaleString()} lines of code</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">👤</div>
                        <h3>Human Code</h3>
                        <div class="value">${data.ai_metrics.human_percentage}%</div>
                        <div class="label">${data.ai_metrics.human_lines.toLocaleString()} lines of code</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">📝</div>
                        <h3>Total Commits</h3>
                        <div class="value">${data.repository.total_commits}</div>
                        <div class="label">${data.commit_analysis.commits_with_ai} with AI contributions</div>
                    </div>
                    <div class="stat-card">
                        <div class="icon">👥</div>
                        <h3>Contributors</h3>
                        <div class="value">${data.repository.contributors_count}</div>
                        <div class="label">Unique contributors</div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>Code Authorship</h2>
                    <div class="progress-labels">
                        <span>🤖 AI: ${data.ai_metrics.ai_lines.toLocaleString()} lines (${data.ai_metrics.ai_percentage}%)</span>
                        <span>👤 Human: ${data.ai_metrics.human_lines.toLocaleString()} lines (${data.ai_metrics.human_percentage}%)</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ai" style="width: ${data.ai_metrics.ai_percentage}%">
                            ${data.ai_metrics.ai_percentage}% AI-Generated
                        </div>
                    </div>
                </div>
                
                <div class="chart-grid">
                    <div class="section">
                        <h2>AI vs Human Code</h2>
                        <div class="chart-container">
                            <canvas id="authorshipChart"></canvas>
                        </div>
                    </div>
                    <div class="section">
                        <h2>Commit Distribution</h2>
                        <div class="chart-container">
                            <canvas id="commitChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>Recent Commits</h2>
                    <ul class="commit-list">
                        ${data.commit_analysis.recent_commits.map(commit => `
                            <li class="commit-item">
                                <span class="commit-sha">${commit.sha.substring(0, 7)}</span>
                                <span class="commit-message">${escapeHtml(commit.message)}</span>
                                ${commit.hasAiNote ? '<span class="ai-badge">🤖 AI</span>' : ''}
                                <span class="timestamp">${new Date(commit.date).toLocaleString()}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                
                <div class="section">
                    <h2>Repository Information</h2>
                    <div class="badge-group">
                        <span class="badge">📂 Branch: ${data.repository.branch}</span>
                        <span class="badge">📊 Total Lines: ${data.ai_metrics.total_lines.toLocaleString()}</span>
                        <span class="badge">🕐 First Commit: ${new Date(data.repository.first_commit).toLocaleDateString()}</span>
                        <span class="badge">🕑 Last Commit: ${new Date(data.repository.last_commit).toLocaleDateString()}</span>
                    </div>
                </div>
                
                <div class="footer">
                    Powered by <a href="https://usegitai.com" target="_blank">Git AI</a> • 
                    Generated automatically on push to ${data.repository.branch} • 
                    <a href="dashboard-data.json" target="_blank">View Raw Data</a>
                </div>
            `;
            
            // Initialize charts
            initCharts(data);
        }
        
        function initCharts(data) {
            // Authorship Pie Chart
            const authorshipCtx = document.getElementById('authorshipChart');
            if (authorshipCtx) {
                new Chart(authorshipCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['AI-Generated', 'Human-Written'],
                        datasets: [{
                            data: [data.ai_metrics.ai_lines, data.ai_metrics.human_lines],
                            backgroundColor: [
                                'rgba(31, 111, 235, 0.8)',
                                'rgba(35, 134, 54, 0.8)'
                            ],
                            borderColor: [
                                'rgba(31, 111, 235, 1)',
                                'rgba(35, 134, 54, 1)'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#c9d1d9', font: { size: 14 } }
                            },
                            tooltip: {
                                callbacks: {
                                    label: (context) => {
                                        const label = context.label || '';
                                        const value = context.parsed || 0;
                                        const percent = ((value / data.ai_metrics.total_lines) * 100).toFixed(1);
                                        return `${label}: ${value.toLocaleString()} lines (${percent}%)`;
                                    }
                                }
                            }
                        }
                    }
                });
            }
            
            // Commit Distribution Bar Chart
            const commitCtx = document.getElementById('commitChart');
            if (commitCtx) {
                new Chart(commitCtx, {
                    type: 'bar',
                    data: {
                        labels: ['Total Commits', 'AI Commits', 'Human Only'],
                        datasets: [{
                            label: 'Commits',
                            data: [
                                data.repository.total_commits,
                                data.commit_analysis.commits_with_ai,
                                data.repository.total_commits - data.commit_analysis.commits_with_ai
                            ],
                            backgroundColor: [
                                'rgba(88, 166, 255, 0.8)',
                                'rgba(31, 111, 235, 0.8)',
                                'rgba(35, 134, 54, 0.8)'
                            ],
                            borderColor: [
                                'rgba(88, 166, 255, 1)',
                                'rgba(31, 111, 235, 1)',
                                'rgba(35, 134, 54, 1)'
                            ],
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (context) => `${context.parsed.y} commits`
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: '#8b949e' },
                                grid: { color: 'rgba(48, 54, 61, 0.5)' }
                            },
                            x: {
                                ticks: { color: '#c9d1d9' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        console.log('Dashboard initialized with data:', dashboardData);
    </script>
</body>
</html>
